
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Admin Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<!-- <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"> -->

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f8;
}

/* Sidebar */
.sidebar {
    height: 100vh;
    background: #1f2937;
    color: white;
    position: fixed;
    width: 260px;
    padding-top: 20px;
}

.sidebar h4 {
    font-weight: 600;
}

.sidebar a {
    color: #d1d5db;
    display: block;
    padding: 14px 25px;
    text-decoration: none;
    transition: 0.3s;
    border-radius: 8px;
    margin: 5px 15px;
    font-size: 15px;
}

.sidebar a:hover {
    background: #374151;
    color: white;
}

/* Content */
.content {
    margin-left: 260px;
    padding: 30px;
}

/* Top Bar */
.topbar {
    background: white;
    padding: 15px 25px;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
}

/* Cards */
.dashboard-card {
    border-radius: 16px;
    padding: 20px;
    border: 1px solid #e5e7eb;
    background: white;
    transition: 0.2s ease;
}

.dashboard-card:hover {
    box-shadow: 0 6px 18px rgba(0,0,0,0.05);
}

.icon-box {
    width: 45px;
    height: 45px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
}

/* Soft Professional Icon Colors */
.icon-blue { background: #dbeafe; color: #2563eb; }
.icon-green { background: #dcfce7; color: #16a34a; }
.icon-orange { background: #fef3c7; color: #d97706; }
.icon-gray { background: #e5e7eb; color: #374151; }

.stat-number {
    font-size: 24px;
    font-weight: 600;
    color: #111827;
}

.stat-label {
    font-size: 14px;
    color: #6b7280;
}


/* Banner */
.banner {
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #e5e7eb;
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4 class="text-center mb-4"><i class="bi bi-mortarboard"></i> Exam Admin</h4>
    <a href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
    <a href="#"><i class="bi bi-people me-2"></i> Students</a>
    <a href="#"><i class="bi bi-file-earmark-text me-2"></i> Exams</a>
    <a href="#"><i class="bi bi-bar-chart me-2"></i> Results</a>
    <a href="#"><i class="bi bi-gear me-2"></i> Settings</a>
    <a href="#"><i class="bi bi-person-plus me-2"></i> Register</a>
</div>

<!-- Main Content -->
<div class="content">

    <!-- Top Bar -->
    <div class="topbar d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0">Welcome Back, Admin</i></h5>
        <div>
            <i class="bi bi-bell fs-5 me-3"></i>
            <img src="https://i.pravatar.cc/40" class="rounded-circle">
        </div>
    </div>

    <!-- Banner Image -->
    <div class="banner mb-4">
        <img src="https://plus.unsplash.com/premium_photo-1670963025018-27dd11a9b0ce?q=80&w=1253&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
             class="img-fluid w-100" style="object-fit:cover; height:200px">
    </div>

    <!-- Statistics Cards -->
    <div class="row g-4">

    <div class="col-md-3">
        <div class="dashboard-card" onclick="showAlert()">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <div class="stat-number">1,240</div>
                    <div class="stat-label">Total Students</div>
                </div>
                <div class="icon-box icon-blue">
                    <i class="bi bi-people"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="dashboard-card" onclick="showAlert()">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <div class="stat-number">35</div>
                    <div class="stat-label">Total Exams</div>
                </div>
                <div class="icon-box icon-green">
                    <i class="bi bi-journal-check"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="dashboard-card" onclick="showAlert()">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <div class="stat-number">12</div>
                    <div class="stat-label">Pending Results</div>
                </div>
                <div class="icon-box icon-orange">
                    <i class="bi bi-hourglass-split"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="dashboard-card" onclick="showAlert()">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <div class="stat-number">₹2.5L</div>
                    <div class="stat-label">Revenue</div>
                </div>
                <div class="icon-box icon-gray">
                    <i class="bi bi-currency-dollar"></i>
                </div>
            </div>
        </div>
    </div>

</div>


</div>

<script>
function showAlert() {
    alert("Card is clicked");
}
</script>

</body>
</html>
